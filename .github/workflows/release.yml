name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: swift test
      - name: Resolve version
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "VERSION=0.2.0" >> "$GITHUB_ENV"
          fi
      - name: Package app
        env:
          BUILD_ARCHS: arm64,x86_64
          BUILD_NUMBER: ${{ github.run_number }}
        run: ./scripts/package_app.sh
      - name: Zip app
        run: |
          ditto -c -k --keepParent dist/StardewModManager.app dist/StardewModManager-macos-universal.zip
          shasum -a 256 dist/StardewModManager-macos-universal.zip > dist/StardewModManager-macos-universal.zip.sha256
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StardewModManager-macos-universal
          path: |
            dist/StardewModManager-macos-universal.zip
            dist/StardewModManager-macos-universal.zip.sha256
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/StardewModManager-macos-universal.zip
            dist/StardewModManager-macos-universal.zip.sha256
